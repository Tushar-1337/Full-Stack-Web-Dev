<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="amazonstyle.css">
    <script src="https://kit.fontawesome.com/53e6df4972.js" crossorigin="anonymous"></script>
    <title>Amazon Clone</title>
</head>
<body>
    <header>
        <div class="navbar">

            <div class="logo">
                <img src="amazon images/amazon logo.png" alt="logo">
            </div>

            <div class="location">
                <p>Delivering to Shirpur 425405 </p>
                <div class="location-update">
                <i class="fa-solid fa-location-dot"></i>
                <span>Update Location</span>    
                </div>
            </div>

            <!-- search Bar -->
            <div class="search-bar">
                <select>
                    <option>ALL</option>
                    <option>Fashion</option>
                    <option>Gaming</option>
                    <option>Electronics</option>
                    <option>Toys</option>
                </select>

                <input type="text" placeholder="Search Amazon.in">

                <button>
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>

            <!-- choose-language -->
            <div class="choose-language">
                <i class="fa-regular fa-flag"></i>
                <select>
                    <option>EN</option>
                    <option>HI</option>
                </select>
            </div>

            <!-- sign in -->
            <div class="sign-in">
                <p> Hello, sign in</p>
                <p> Account & List</p>
            </div>

            <!-- Returns -->
            <div class="return">
                <span>Returns</span>
                <span> & Orders</span>
            </div>

            <!-- Cart -->
            <div class="cart">
                <i class="fa-solid fa-cart-shopping"></i>
            </div> 

        </div>
    </header>
    
</body>
</html>
