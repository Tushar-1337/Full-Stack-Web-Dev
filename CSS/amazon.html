<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="amazonstyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://kit.fontawesome.com/53e6df4972.js" crossorigin="anonymous"></script>
    <title>Amazon Clone</title>
</head>
<body>
    <header>
        <div class="navbar">

            <div class="logo">
                <img src="amazon images/amazon logo.png" alt="logo">
            </div>

            <div class="location">
                <p>Delivering to Shirpur 425405 </p>
                <div class="location-update">
                <i class="fa-solid fa-location-dot"></i>
                <span>Update Location</span>    
                </div>
            </div>

            <!-- search Bar -->
            <div class="search-bar">
                <select>
                    <option>ALL</option>
                    <option>Fashion</option>
                    <option>Gaming</option>
                    <option>Electronics</option>
                    <option>Toys</option>
                </select>

                <input type="text" placeholder="Search Amazon.in">

                <button>
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>

            <!-- choose-language -->
            <div class="choose-language">
                <img src="amazon images/indian-icon.png" alt="indian-icon">
                <select>
                    <option>EN</option>
                    <option>HI</option>
                </select>
            </div>

            <!-- sign in -->
            <div class="sign-in">
                <span class="nav-first"> Hello, sign in</span>
                <span class="nav-second"> Account & List</span>
            </div>

            <!-- Returns -->
            <div class="return">
                <span class="nav-first-return">Returns</span>
                <span class="nav-second-return"> & Orders</span>
            </div>

            <!-- Cart -->
            <div class="cart">
                <i class="fa-solid fa-cart-shopping"></i>
                <span>Cart</span>
            </div> 

        </div>

        <!-- Panel -->
        <nav class="panel">
        <a href="#">MX Player</a>
        <a href="#">Best Sellers</a>
        <a href="#">Sell</a>
        <a href="#">Today's Deal</a>
        <a href="#">Prime</a>
        <a href="#">Mobiles</a>
        <a href="#">New Releases</a>
        <a href="#">Customer Service</a>
        <a href="#">Amazon Pay</a>
        <a href="#">Electronics</a>
        </nav>

    </header>
    
</body>
</html>
